name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QualityStudio.slnx

      - name: Build
        run: dotnet build QualityStudio.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test QualityStudio.slnx --configuration Release --no-build

      - name: Security scan
        run: dotnet run --project src/quality-cli -- security scan .
