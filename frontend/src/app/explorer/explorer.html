<aside class="pane tree-pane">
  <div class="pane-header"><div><span class="eyebrow">Repository</span><strong>Explorer</strong></div><button class="quiet" (click)="api.loadTree()">↻</button></div>
  <label class="search"><span>⌕</span><input aria-label="Filter files" placeholder="Filter files…" [ngModel]="query()" (ngModelChange)="query.set($event)" /></label>
  <div class="legend"><span><i class="status fresh"></i>Fresh</span><span><i class="status stale"></i>Stale</span><span><i class="status missing"></i>Missing</span></div>
  <div class="virtual-tree" (scroll)="scrollTop.set($any($event.target).scrollTop)">
    <div class="tree-space" [style.height.px]="filteredRows().length * 30">
      @for (item of visibleRows(); track item.node.id) {
        <button class="tree-row" [class.selected]="selectedPath() === item.node.path" [style.top.px]="item.top" [style.padding-left.px]="10 + item.node.depth * 16" (click)="item.node.level === 'file' ? fileOpen.emit(item.node.path) : item.node.children.length ? toggle(item.node) : null">
          <span class="chevron" [class.open]="expanded().has(item.node.id)">{{ item.node.children.length ? '›' : '' }}</span>
          <span class="node-icon">{{ item.node.children.length ? '▰' : '≡' }}</span><span class="node-name">{{ item.node.name }}</span>
          <span class="tree-states" aria-label="Rolled-up review states">
            @for (decoration of item.node.decorations; track decoration.kind) { <i class="status" [class]="'status ' + decoration.state" [title]="decoration.label"><span class="sr-only">{{ decoration.label }}</span></i> }
          </span>
        </button>
      }
    </div>
  </div>
  <div class="pane-footer"><span>{{ filteredRows().length }} items</span><span>3 review kinds</span></div>
</aside>
